<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Dashboard Bulletin</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="assets/css/dashboard.css">

<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

</head>

<body>

<header class="topbar">

<div class="topbar-left">
<h1>Frequence SUD</h1>
<input
type="text"
id="bulletinPeriod"
placeholder="Période du bulletin"
>
</div>

<div class="topbar-actions">

<button id="addCardBtn">
➕ Carte
</button>

<button id="publishWebBtn">
🌐 Publier Web
</button>

<button id="publishEmailBtn">
📧 Publier Email
</button>

<button id="openArchivesBtn">
📂 Archives
</button>

<button id="logoutBtn">
🚪 Déconnexion
</button>

</div>

</header>



<main class="dashboard-main">

<div class="board-wrapper">

<div
class="bento-board"
id="bentoBoard"
>

</div>

</div>

</main>



<div
class="modal"
id="cardModal"
>

<div class="modal-content">

<div class="modal-header">

<h2>
Carte
</h2>

<button
class="close-modal"
id="closeModal"
>
✕
</button>

</div>



<div class="modal-body">

<div class="form-grid">


<div class="form-group">

<label>
Titre
</label>

<input
type="text"
id="cardTitle"
>

</div>



<div class="form-group">

<label>
Type de carte
</label>

<select id="cardType">

<option value="news">
Actu
</option>

<option value="event">
Événement
</option>

<option value="info">
Info
</option>

<option value="link">
Lien
</option>

<option value="app">
Application
</option>

<option value="custom">
Personnalisée
</option>

</select>

</div>



<div class="form-group">

<label>
Icône / emoji
</label>

<input
type="text"
id="cardIcon"
placeholder="📢"
>

</div>



<div class="form-group">

<label>
Lien
</label>

<input
type="text"
id="cardLink"
placeholder="https://"
>

</div>



<div class="form-group">

<label>
Image de fond
</label>

<input
type="text"
id="cardImage"
placeholder="https://..."
>

</div>



<div class="form-group">

<label>
Couleur fond
</label>

<input
type="color"
id="cardBgColor"
value="#ffffff"
>

</div>



<div class="form-group">

<label>
Largeur
</label>

<select id="cardColSpan">

<option value="1">
1
</option>

<option value="2">
2
</option>

<option value="3">
3
</option>

<option value="4">
4
</option>

</select>

</div>



<div class="form-group">

<label>
Hauteur
</label>

<select id="cardRowSpan">

<option value="1">
1
</option>

<option value="2">
2
</option>

</select>

</div>



<div class="form-group full">

<label>
Texte court
</label>

<div id="shortTextEditor">

</div>

</div>



<div class="form-group full">

<label>
Texte long
</label>

<div id="longTextEditor">

</div>

</div>



<div class="form-group full">

<label>
Texte email
</label>

<textarea
id="cardEmailText"
rows="3"
></textarea>

</div>



</div>

</div>



<div class="modal-footer">

<button
class="btn-secondary"
id="deleteCardBtn"
>
Supprimer
</button>

<button
class="btn-primary"
id="saveCardBtn"
>
Enregistrer
</button>

</div>

</div>

</div>



<div
class="modal"
id="archiveModal"
>

<div class="modal-content small">

<div class="modal-header">

<h2>
Archives
</h2>

<button
class="close-modal"
data-close="archiveModal"
>
✕
</button>

</div>



<select
id="archiveSelect"
>

</select>



<button
class="btn-primary full"
id="loadArchiveBtn"
>
Charger
</button>

</div>

</div>



<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script src="assets/js/dashboard.js"></script>
<div id="toast" class="toast">
  <span id="toastText">Brouillon enregistré</span>
</div>
</body>
</html>
